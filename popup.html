<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Intelligence Harvester</title>
  </head>
  <body>
    <div class="popup-shell">
      <header class="popup-header">
        <div>
          <p class="eyebrow">LinkedIn Intelligence Harvester</p>
          <h1>Extension Settings</h1>
        </div>
      </header>

      <section class="info-panel">
        <p class="section-label">Operator note</p>
        <p class="status-copy">
          Run control, counters and export stay in the injected LinkedIn panel.
          This popup is now reserved for configuration and debug reset only.
        </p>
      </section>

      <section class="activity-panel">
        <div class="activity-header">
          <span class="section-label">Gemini setup</span>
        </div>
        <label class="checkbox-row">
          <input id="ai-enabled" type="checkbox" />
          <span>Enable AI validation</span>
        </label>
        <label class="field">
          <span>API key</span>
          <input id="ai-api-key" type="password" autocomplete="off" />
        </label>
        <label class="field">
          <span>Model</span>
          <input id="ai-model" type="text" value="gemini-2.5-flash" />
        </label>
        <label class="field field-textarea">
          <span>System instruction</span>
          <textarea id="ai-system-instruction" rows="6"></textarea>
        </label>
        <button id="save-ai-config" type="button" class="primary-button">
          Save AI config
        </button>
      </section>

      <section class="activity-panel">
        <div class="activity-header">
          <span class="section-label">Debug reset</span>
        </div>
        <p id="tab-debug-status" class="status-copy">
          Select a LinkedIn tab to reset captured data for reruns.
        </p>
        <button id="reset-debug-data" type="button" class="secondary-button">
          Reset current tab data
        </button>
      </section>

      <p id="popup-feedback" class="feedback-copy" aria-live="polite"></p>
    </div>
    <script type="module" src="/src/ui/popup/main.js"></script>
  </body>
</html>
